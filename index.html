<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MGRS Calc</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    /* ========== カラーテーマ変数 ========== */
    :root {
      --bg-color: #f2f2f7; --card-bg: #ffffff; --text-color: #333333; --border-color: #cccccc;
      --input-bg: #ffffff; --input-text: #000000; --result-bg: #e5f0ff; --result-text: #004080;
      /* ★ マップ方眼線の色 (1km, 500m, 100mの3段階) */
      --map-bg: #ffffff; --map-grid-1km: rgba(0, 0, 0, 0.4); --map-grid-500m: rgba(0, 0, 0, 0.25); --map-grid-100m: rgba(0, 0, 0, 0.1); --map-text: rgba(0, 0, 0, 0.7); --list-border: #eeeeee;
      --header-bg: #007aff; --header-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #000000; --card-bg: #1c1c1e; --text-color: #f5f5f5; --border-color: #444444;
        --input-bg: #2c2c2e; --input-text: #ffffff; --result-bg: #0a244d; --result-text: #66a3ff;
        --map-bg: #111111; --map-grid-1km: rgba(255, 255, 255, 0.4); --map-grid-500m: rgba(255, 255, 255, 0.25); --map-grid-100m: rgba(255, 255, 255, 0.1); --map-text: rgba(255, 255, 255, 0.7); --list-border: #333333;
      }
    }
    
    /* ★ タクティカル・ナイトモード (赤色UI) ★ */
    body.tactical-night {
      --bg-color: #000000; --card-bg: #110000; --text-color: #ff3b30; --border-color: #aa0000;
      --input-bg: #000000; --input-text: #ff3b30; --result-bg: #220000; --result-text: #ff6b60;
      --map-bg: #000000; --map-grid-1km: rgba(255, 59, 48, 0.6); --map-grid-500m: rgba(255, 59, 48, 0.4); --map-grid-100m: rgba(255, 59, 48, 0.15); --map-text: rgba(255, 59, 48, 0.9); --list-border: #440000;
      --header-bg: #220000; --header-text: #ff3b30;
    }
    body.tactical-night button { background-color: #330000 !important; color: #ff3b30 !important; border: 1px solid #ff3b30 !important; }
    body.tactical-night header { border-bottom: 1px solid #ff3b30; }
    body.tactical-night input, body.tactical-night select, body.tactical-night textarea { border: 1px solid #ff0000; }
    body.tactical-night .drag-handle { color: #aa0000; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: background-color 0.3s; }
    header { background-color: var(--header-bg); color: var(--header-text); padding: 15px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.3s; }
    .container { padding: 15px; }
    
    select, input[type="text"], input[type="number"], input[type="file"], textarea { background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); font-family: sans-serif; transition: background-color 0.3s; }
    select { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; border-radius: 8px; box-sizing: border-box; }
    textarea { width: 100%; box-sizing: border-box; padding: 12px; font-size: 14px; border-radius: 5px; resize: vertical; min-height: 120px; margin-bottom: 10px; font-family: monospace; border:1px solid var(--border-color); }
    input[type="file"] { padding: 8px; border-radius: 5px; box-sizing: border-box; }
    
    .card { background: var(--card-bg); padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 15px; transition: background-color 0.3s; }
    .card h3 { margin-top: 0; font-size: 16px; color: var(--text-color); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
    .input-group input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 16px; border-radius: 5px; }
    
    .route-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .route-row input { flex: 1; min-width: 0; padding: 12px; font-size: 16px; border-radius: 5px; box-sizing: border-box; }
    .route-row button { width: auto; padding: 12px 15px; background-color: #ff3b30; margin-bottom: 0; border-radius: 5px; }
    
    button { width: 100%; padding: 15px; background-color: #007aff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; box-sizing: border-box; transition: 0.2s; }
    button:active { opacity: 0.7; }
    button.btn-green { background-color: #34c759; }
    button.btn-gray { background-color: #8e8e93; }
    button.btn-red { background-color: #ff3b30; }
    button.btn-small { padding: 10px; font-size: 14px; margin-bottom: 10px;}
    button.btn-gps { background-color: #ff9500; padding: 8px 12px; font-size: 13px; margin-bottom: 0; width: auto; flex-shrink: 0; }
    
    .result { background: var(--result-bg); padding: 15px; border-radius: 8px; text-align: center; font-family: monospace; font-size: 18px; font-weight: bold; color: var(--result-text); line-height: 1.5; }
    .hidden { display: none !important; }

    .color-select-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
    .color-select-row span { font-size: 16px; font-weight: bold; color: var(--text-color); }
    .color-picker { width: 44px; height: 44px; padding: 0; border: none; border-radius: 5px; background: none; cursor: pointer; flex-shrink: 0; }
    
    .quick-save { display: flex; gap: 10px; align-items: center; justify-content: center; }
    .quick-save input[type="text"] { padding: 10px; border-radius: 5px; font-size: 16px; flex: 1; font-family: sans-serif; }
    .quick-save button { width: auto; margin: 0; padding: 10px 15px; background-color: #34c759; font-size: 14px; flex-shrink: 0; }

    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--list-border); transition: background-color 0.2s; background-color: var(--card-bg); }
    .list-item:last-child { border-bottom: none; }
    .list-item.dragging { background-color: var(--result-bg); opacity: 0.8; box-shadow: inset 0 0 8px rgba(0,0,0,0.1); }
    
    .drag-handle { padding: 10px 15px 10px 5px; font-size: 24px; color: #888; font-weight: bold; touch-action: none; cursor: grab; }
    .list-item div.content { font-size: 14px; flex: 1; margin-left: 5px; pointer-events: none; line-height: 1.4; }
    .action-btns { display: flex; gap: 5px; margin-right: 5px; }
    .action-btns button { width: auto; padding: 8px 12px; margin: 0; font-size: 12px; border-radius: 5px; }

    .map-container { position: relative; width: 100%; overflow: hidden; }
    canvas { width: 100%; height: auto; aspect-ratio: 1; background-color: var(--map-bg); border: 1px solid var(--border-color); border-radius: 8px; touch-action: none; transition: background-color 0.3s; }
  </style>
</head>
<body>

<header>
  <span>MGRS Calc</span>
  <button onclick="toggleNightMode()" style="width:auto; padding:5px 10px; margin:0; background:rgba(0,0,0,0.2); border:1px solid var(--header-text); color:var(--header-text); font-size:14px; border-radius:5px;">🌙 暗視</button>
</header>

<div class="container">
  <select id="menu" onchange="switchView()">
    <option value="func1">1. 座標対座標</option>
    <option value="func2">2. 極座標</option>
    <option value="func3">3. 前方交会法</option>
    <option value="func4">4. 後方交会法</option>
    <option value="func5">5. トラバース計算</option>
    <option value="func6">6. 座標の登録・一覧・GPS</option>
    <option value="func7">7. マップ (1km方眼)</option>
  </select>

  <div id="func1" class="view">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap: 10px;">
        <h3 style="margin:0;">現在地</h3>
        <button class="btn-gps" onclick="getGPS('f1_sx', 'f1_sy', 'f1_sz')">📍GPS取得</button>
      </div>
      <div class="input-group">
        <input type="text" inputmode="numeric" id="f1_sx" placeholder="E座標 (必須)">
        <input type="text" inputmode="numeric" id="f1_sy" placeholder="N座標 (必須)">
        <input type="number" id="f1_sz" placeholder="標高(m) ※任意">
      </div>
      <hr style="border:0; border-top:1px dashed var(--border-color); margin:15px 0;">
      <h3>目標地</h3>
      <div class="input-group">
        <input type="text" inputmode="numeric" id="f1_ex" placeholder="E座標 (必須)">
        <input type="text" inputmode="numeric" id="f1_ey" placeholder="N座標 (必須)">
        <input type="number" id="f1_ez" placeholder="標高(m) ※任意">
      </div>
    </div>
    <button onclick="calcF1()">計算実行</button>
    <div id="res1" class="result hidden"></div>
  </div>

  <div id="func2" class="view hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap: 10px;">
        <h3 style="margin:0;">現在地</h3>
        <button class="btn-gps" onclick="getGPS('f2_x', 'f2_y', 'f2_z')">📍GPS取得</button>
      </div>
      <div class="input-group">
        <input type="text" inputmode="numeric" id="f2_x" placeholder="E座標 (必須)">
        <input type="text" inputmode="numeric" id="f2_y" placeholder="N座標 (必須)">
        <input type="number" id="f2_z" placeholder="標高(m) ※任意">
      </div>
      <hr style="border:0; border-top:1px dashed var(--border-color); margin:15px 0;">
      <h3>目標への諸元</h3>
      <div class="input-group">
        <input type="number" id="f2_az" placeholder="方位角(mil) (必須)">
        <input type="number" id="f2_dist" placeholder="距離(m) (必須)">
        <input type="number" id="f2_elv" placeholder="高低角(mil) ※任意">
      </div>
    </div>
    <button onclick="calcF2()">計算実行</button>
    <div id="res2" class="result hidden"></div>
  </div>

  <div id="func3" class="view hidden">
    <div class="card">
      <h3>観測点-A</h3>
      <div class="input-group"><input type="text" inputmode="numeric" id="f3_p1x" placeholder="E座標"><input type="text" inputmode="numeric" id="f3_p1y" placeholder="N座標"><input type="number" id="f3_az1" placeholder="目標への方位角 (mil)"></div>
    </div>
    <div class="card">
      <h3>観測点-B</h3>
      <div class="input-group"><input type="text" inputmode="numeric" id="f3_p2x" placeholder="E座標"><input type="text" inputmode="numeric" id="f3_p2y" placeholder="N座標"><input type="number" id="f3_az2" placeholder="目標への方位角 (mil)"></div>
    </div>
    <button onclick="calcF3()">計算実行</button>
    <div id="res3" class="result hidden"></div>
  </div>

  <div id="func4" class="view hidden">
    <div class="card">
      <p style="font-size:14px; color:var(--text-color); margin-top:0; opacity: 0.8;">未知の現在地から、既知の2点へ方位角を測定し、現在地を求めます。</p>
      <h3>既知点-A</h3>
      <div class="input-group"><input type="text" inputmode="numeric" id="f4_p1x" placeholder="E座標"><input type="text" inputmode="numeric" id="f4_p1y" placeholder="N座標"><input type="number" id="f4_az1" placeholder="Aへの測定方位角 (mil)"></div>
    </div>
    <div class="card">
      <h3>既知点-B</h3>
      <div class="input-group"><input type="text" inputmode="numeric" id="f4_p2x" placeholder="E座標"><input type="text" inputmode="numeric" id="f4_p2y" placeholder="N座標"><input type="number" id="f4_az2" placeholder="Bへの測定方位角 (mil)"></div>
    </div>
    <button onclick="calcF4()">計算実行</button>
    <div id="res4" class="result hidden"></div>
  </div>

  <div id="func5" class="view hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap: 10px;">
        <h3 style="margin:0;">開始点</h3>
        <button class="btn-gps" onclick="getGPS('f5_x', 'f5_y', null)">📍GPS取得</button>
      </div>
      <div class="input-group"><input type="text" inputmode="numeric" id="f5_x" placeholder="E座標"><input type="text" inputmode="numeric" id="f5_y" placeholder="N座標"></div>
      <h3>移動リスト</h3>
      <div id="routeList">
        <div class="route-row"><input type="number" class="r_az" placeholder="方位"><input type="number" class="r_dist" placeholder="距離"></div>
      </div>
      <button class="btn-green" onclick="addRouteRow()" style="margin-top:10px;">＋ 移動を追加</button>
    </div>
    <button onclick="calcF5()">計算実行</button>
    <div id="res5" class="result hidden"></div>
  </div>

  <div id="func6" class="view hidden">
    
    <div class="card" style="padding-bottom: 5px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0;">テキスト一括入出力</h3>
        <button class="btn-gray btn-small" onclick="toggleBatchIO()" style="margin:0; width:auto; padding:6px 10px;">📁 データ共有</button>
      </div>
      
      <div id="batch_io_area" class="hidden" style="background:var(--bg-color); padding:12px; border-radius:8px; margin-bottom:10px; border:1px solid var(--border-color);">
        <p style="font-size:12px; margin-top:0; opacity:0.8;">【書式】名称 E座標 N座標 標高(任意) 色<br>例: T1 00700 04245 150 赤</p>
        <textarea id="io_text" placeholder="ここにテキストを貼り付けて読み込むか、下のボタンで現在のデータを書き出します。"></textarea>
        <div style="display:flex; gap:10px;">
          <button class="btn-green btn-small" onclick="importPoints()" style="margin:0; flex:1;">↓ 読込</button>
          <button class="btn-gray btn-small" onclick="exportPoints()" style="margin:0; flex:1;">↑ 書出</button>
        </div>
      </div>
    </div>

    <div id="edit_card" class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap: 10px;">
        <h3 id="edit_title" style="margin:0;">座標を手動登録</h3>
        <button class="btn-gps" onclick="getGPS('f6_x', 'f6_y', 'f6_z')">📍現在地</button>
      </div>
      <div class="color-select-row">
        <span>マップ表示色</span>
        <input type="color" id="f6_color" class="color-picker">
      </div>
      <div class="input-group">
        <input type="text" id="f6_name" placeholder="名称 (例: 観測所A)">
        <input type="text" inputmode="numeric" id="f6_x" placeholder="E座標 (必須)">
        <input type="text" inputmode="numeric" id="f6_y" placeholder="N座標 (必須)">
        <input type="number" id="f6_z" placeholder="標高(m) ※任意">
      </div>
      <div style="display:flex; gap:10px;">
        <button id="btn_manual_save" class="btn-green" onclick="savePointManual()" style="margin-bottom:0;">登録</button>
        <button id="btn_manual_cancel" class="btn-gray hidden" onclick="cancelEdit()" style="margin-bottom:0; width:40%;">キャンセル</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:5px;">
        <h3 style="margin:0; font-size:15px; white-space:nowrap;">登録済み座標</h3>
        <div style="display:flex; gap:5px; align-items:center;">
          <select id="sort_select" style="width:auto; padding:5px; font-size:12px; margin:0; border-radius:5px;" onchange="applySort()">
            <option value="manual">手動(≡)</option>
            <option value="name_asc">名前順</option>
            <option value="e_asc">E座標順</option>
            <option value="n_asc">N座標順</option>
          </select>
          <button class="btn-red btn-small" onclick="deleteAllPoints()" style="margin:0; width:auto; padding:6px 10px; font-size:12px; flex-shrink:0;">全削除</button>
        </div>
      </div>
      <div id="savedList"></div>
    </div>
  </div>

  <div id="func7" class="view hidden">
    
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0;">マップ (1km方眼)</h3>
        <button class="btn-gray btn-small" onclick="toggleMapSettings()" style="margin:0; width:auto; padding:6px 10px;">🗺️ 背景設定</button>
      </div>
      <p style="font-size:12px; margin-top:0; opacity:0.7;">※1本指で移動、2本指で拡大縮小</p>

      <div id="map_settings_area" class="hidden" style="background:var(--bg-color); padding:12px; border-radius:8px; margin-bottom:15px; border:1px solid var(--border-color);">
        <h4 style="margin-top:0; margin-bottom:8px; font-size:14px; color:var(--text-color);">カスタム地図（オフライン背景）</h4>
        <p style="font-size:12px; margin-top:0; opacity:0.7;">スマホ内の地図画像を読み込み、左上と右下の座標を入力することで背景に配置します。</p>
        <input type="file" id="map_image_input" accept="image/*" style="width:100%; margin-bottom: 10px; font-size:14px;">
        
        <div style="display:flex; gap:10px; margin-bottom:5px;">
          <input type="text" id="map_tl_e" placeholder="左上 E座標" inputmode="numeric" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--input-bg); color:var(--input-text);">
          <input type="text" id="map_tl_n" placeholder="左上 N座標" inputmode="numeric" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--input-bg); color:var(--input-text);">
        </div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <input type="text" id="map_br_e" placeholder="右下 E座標" inputmode="numeric" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--input-bg); color:var(--input-text);">
          <input type="text" id="map_br_n" placeholder="右下 N座標" inputmode="numeric" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--input-bg); color:var(--input-text);">
        </div>
        
        <div style="display:flex; gap:10px;">
          <button class="btn-green btn-small" onclick="saveMapOverlay()" style="margin:0; flex:1;">設定・保存</button>
          <button class="btn-red btn-small" onclick="clearMapOverlay()" style="margin:0; flex:1;">背景をクリア</button>
        </div>
      </div>

      <div class="map-container">
        <canvas id="mapCanvas" width="400" height="400"></canvas>
      </div>
      <button class="btn-gray btn-small" onclick="resetMapView()" style="margin-top:10px;">視点をリセット</button>
      
      <h3 style="margin-top: 20px;">登録座標から諸元計算</h3>
      <div class="input-group">
        <select id="map_start"></select>
        <select id="map_end"></select>
      </div>
      <button onclick="calcMap()">方位角・距離・高低差を計算</button>
      <div id="resMap" class="result hidden"></div>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
  }

  const MILS_CIRCLE = 6400.0;
  let savedPoints = JSON.parse(localStorage.getItem('mgrsPoints') || '[]');
  let lastColor = localStorage.getItem('mgrsLastColor') || '#ff3b30';
  let isNightMode = localStorage.getItem('tacticalMode') === 'true';
  let editingId = null; 

  // ★カスタム地図用の変数
  let mapOverlay = JSON.parse(localStorage.getItem('mgrsMapOverlay') || 'null');
  let mapImageObj = new Image();
  if (mapOverlay) { mapImageObj.src = mapOverlay.dataUrl; }

  if (isNightMode) document.body.classList.add('tactical-night');

  function toggleNightMode() {
    isNightMode = !isNightMode;
    if (isNightMode) document.body.classList.add('tactical-night');
    else document.body.classList.remove('tactical-night');
    localStorage.setItem('tacticalMode', isNightMode);
    drawMap(currentP1, currentP2, false); 
  }

  function toggleMapSettings() {
    let el = document.getElementById('map_settings_area');
    if(el.classList.contains('hidden')) { el.classList.remove('hidden'); } 
    else { el.classList.add('hidden'); }
  }

  function toggleBatchIO() {
    let el = document.getElementById('batch_io_area');
    if(el.classList.contains('hidden')) { el.classList.remove('hidden'); } 
    else { el.classList.add('hidden'); }
  }

  const parseCoord = (val) => {
    if (val === "" || val === null || val === undefined) return null;
    let s = String(val).trim().substring(0, 5).padEnd(5, '0');
    return Number(s);
  };
  const parseZ = (val) => {
    if (val === "" || val === null || val === undefined || val === "-") return null;
    return Number(val);
  };
  const pad5 = (num) => {
    let n = Math.round(num); n = ((n % 100000) + 100000) % 100000;
    return String(n).padStart(5, '0');
  };
  const pad4 = (num) => String(Math.round(num)).padStart(4, '0');

  // ===== GPS / UTM 変換ロジック =====
  function latLonToUTM(lat, lon) {
    const a = 6378137.0; const f = 1 / 298.257223563; const k0 = 0.9996;
    const eccSquared = 2*f - f*f; const zoneNumber = Math.floor((lon + 180) / 6) + 1;
    const lonOrigin = (zoneNumber - 1) * 6 - 180 + 3; const lonOriginRad = lonOrigin * Math.PI / 180;
    const latRad = lat * Math.PI / 180; const lonRad = lon * Math.PI / 180;
    const N = a / Math.sqrt(1 - eccSquared * Math.sin(latRad) * Math.sin(latRad));
    const T = Math.tan(latRad) * Math.tan(latRad); const C = eccSquared * Math.cos(latRad) * Math.cos(latRad) / (1 - eccSquared);
    const A = Math.cos(latRad) * (lonRad - lonOriginRad);
    const M = a * ((1 - eccSquared/4 - 3*eccSquared*eccSquared/64 - 5*Math.pow(eccSquared,3)/256) * latRad 
                 - (3*eccSquared/8 + 3*eccSquared*eccSquared/32 + 45*Math.pow(eccSquared,3)/1024) * Math.sin(2*latRad) 
                 + (15*eccSquared*eccSquared/256 + 45*Math.pow(eccSquared,3)/1024) * Math.sin(4*latRad) 
                 - (35*Math.pow(eccSquared,3)/3072) * Math.sin(6*latRad));
    const utmE = (k0 * N * (A + (1-T+C)*Math.pow(A,3)/6 + (5-18*T+T*T+72*C-58*eccSquared)*Math.pow(A,5)/120)) + 500000.0;
    let utmN = k0 * (M + N*Math.tan(latRad)*(A*A/2 + (5-T+9*C+4*C*C)*Math.pow(A,4)/24 + (61-58*T+T*T+600*C-330*eccSquared)*Math.pow(A,6)/720));
    if (lat < 0) utmN += 10000000.0;
    return { e: utmE, n: utmN };
  }
  function getMGRSfromLatLon(lat, lon) {
    let utm = latLonToUTM(lat, lon); return { e: Math.floor(utm.e % 100000), n: Math.floor(utm.n % 100000) };
  }
  function getGPS(eId, nId, zId) {
    if (!navigator.geolocation) { alert("この端末ではGPSがサポートされていません"); return; }
    document.getElementById(eId).value = "取得中..."; document.getElementById(nId).value = "取得中...";
    navigator.geolocation.getCurrentPosition(pos => {
      let mgrs = getMGRSfromLatLon(pos.coords.latitude, pos.coords.longitude);
      document.getElementById(eId).value = pad5(mgrs.e); document.getElementById(nId).value = pad5(mgrs.n);
      if (zId && pos.coords.altitude !== null) { document.getElementById(zId).value = Math.round(pos.coords.altitude); }
    }, err => { alert("GPS取得失敗: " + err.message); document.getElementById(eId).value = ""; document.getElementById(nId).value = ""; }, { enableHighAccuracy: true });
  }

    if (cmap[m]) return cmap[m];
    if (m.startsWith('#') && (m.length === 4 || m.length === 7)) return m; return lastColor;
  }

  // ===== 計算コアロジック =====
  function calcData(sx, sy, sz, ex, ey, ez) {
    let dx = ex - sx; let dy = ey - sy;
    if (dx < -50000) dx += 100000; else if (dx > 50000) dx -= 100000;
    if (dy < -50000) dy += 100000; else if (dy > 50000) dy -= 100000;
    let dist = Math.sqrt(dx*dx + dy*dy); let rad = Math.atan2(dx, dy);
    let mil = rad * (MILS_CIRCLE / (2 * Math.PI)); if (mil < 0) mil += MILS_CIRCLE;
    let elvMil = null; let dz = null;
    if (sz !== null && ez !== null) { dz = ez - sz; elvMil = Math.atan2(dz, dist) * (MILS_CIRCLE / (2 * Math.PI)); }
    return { mil: mil, dist: dist, elvMil: elvMil, dz: dz };
  }

              <div class="quick-save"><input type="text" id="${inputId}" placeholder="名称"><button onclick="quickSave('${inputId}', ${x}, ${y}, ${zArg})">登録</button></div>
            </div>`;

  function calcF1() {
    let sx = parseCoord(document.getElementById('f1_sx').value); let sy = parseCoord(document.getElementById('f1_sy').value); let sz = parseZ(document.getElementById('f1_sz').value);
    let ex = parseCoord(document.getElementById('f1_ex').value); let ey = parseCoord(document.getElementById('f1_ey').value); let ez = parseZ(document.getElementById('f1_ez').value);
    if(sx===null || sy===null || ex===null || ey===null) return;
    let r = calcData(sx, sy, sz, ex, ey, ez);
    let elvText = r.elvMil !== null ? `<br>高低差: ${r.dz > 0 ? '+' : ''}${Math.round(r.dz)} m<br>高低角: ${r.elvMil > 0 ? '+' : ''}${Math.round(r.elvMil)} mil` : "";
    document.getElementById('res1').innerHTML = `方位角: ${pad4(r.mil)}<br>距離: ${Math.round(r.dist)} m${elvText}`;
    document.getElementById('res1').classList.remove('hidden');
  }

  function calcF2() {
    let x = parseCoord(document.getElementById('f2_x').value); let y = parseCoord(document.getElementById('f2_y').value); let z = parseZ(document.getElementById('f2_z').value);
    let azStr = document.getElementById('f2_az').value; let distStr = document.getElementById('f2_dist').value; let elv = parseZ(document.getElementById('f2_elv').value);
    if(x===null || y===null || azStr === "" || distStr === "") return;
    let az = Number(azStr); let dist = Number(distStr);
    let targetX = x + dist * Math.sin(az * (2 * Math.PI / MILS_CIRCLE)); let targetY = y + dist * Math.cos(az * (2 * Math.PI / MILS_CIRCLE));
    let targetZ = null; let zStrInfo = "";
    if (z !== null && elv !== null) { let dz = dist * Math.tan(elv * (2 * Math.PI / MILS_CIRCLE)); targetZ = z + dz; zStrInfo = `  H: ${Math.round(targetZ)}`; }
    let res = document.getElementById('res2'); res.innerHTML = `目標座標<br>E: ${pad5(targetX)}  N: ${pad5(targetY)}${zStrInfo}` + getSaveUI('qname_f2', targetX, targetY, targetZ); 
    res.classList.remove('hidden'); syncColorPickers();
  }

  function calcF3() {
    let p1x = parseCoord(document.getElementById('f3_p1x').value); let p1y = parseCoord(document.getElementById('f3_p1y').value); let az1 = Number(document.getElementById('f3_az1').value);
    let p2x = parseCoord(document.getElementById('f3_p2x').value); let p2y = parseCoord(document.getElementById('f3_p2y').value); let az2 = Number(document.getElementById('f3_az2').value);
    if(p1x===null || p2x===null) return;
    let tan1 = Math.tan(Math.PI/2 - (az1 * (2 * Math.PI / MILS_CIRCLE))); let tan2 = Math.tan(Math.PI/2 - (az2 * (2 * Math.PI / MILS_CIRCLE)));
    let res = document.getElementById('res3');
    if (Math.abs(tan1 - tan2) < 0.0001) res.innerHTML = '<span style="color:red">交点なし (平行等)</span>';
    else { let intX = (tan1 * p1x - tan2 * p2x + p2y - p1y) / (tan1 - tan2); let intY = tan1 * (intX - p1x) + p1y; res.innerHTML = `交点座標<br>E: ${pad5(intX)}  N: ${pad5(intY)}` + getSaveUI('qname_f3', intX, intY); }
    res.classList.remove('hidden'); syncColorPickers();
  }

  function calcF4() {
    let p1x = parseCoord(document.getElementById('f4_p1x').value); let p1y = parseCoord(document.getElementById('f4_p1y').value); let az1 = Number(document.getElementById('f4_az1').value);
    let p2x = parseCoord(document.getElementById('f4_p2x').value); let p2y = parseCoord(document.getElementById('f4_p2y').value); let az2 = Number(document.getElementById('f4_az2').value);
    if(p1x===null || p2x===null) return;
    let tan1 = Math.tan(Math.PI/2 - (((az1 + 3200) % 6400) * (2 * Math.PI / MILS_CIRCLE))); let tan2 = Math.tan(Math.PI/2 - (((az2 + 3200) % 6400) * (2 * Math.PI / MILS_CIRCLE)));
    let res = document.getElementById('res4');
    if (Math.abs(tan1 - tan2) < 0.0001) res.innerHTML = '<span style="color:red">交点なし (平行等)</span>';
    else { let intX = (tan1 * p1x - tan2 * p2x + p2y - p1y) / (tan1 - tan2); let intY = tan1 * (intX - p1x) + p1y; res.innerHTML = `現在地座標<br>E: ${pad5(intX)}  N: ${pad5(intY)}` + getSaveUI('qname_f4', intX, intY); }
    res.classList.remove('hidden'); syncColorPickers();
  }

  // ★テキスト一括入出力
  function importPoints() {
    let text = document.getElementById('io_text').value; if (!text.trim()) { alert("テキストを入力してください"); return; }
    let lines = text.split('\n'); let addedCount = 0; let updatedCount = 0;
    for (let line of lines) {
       let parts = line.trim().split(/[\s\t]+/);
       if (parts.length >= 3) {
          let name = parts[0]; let e = parseCoord(parts[1]); let n = parseCoord(parts[2]);
          if (e !== null && n !== null) {
             let z = null, color = lastColor;
             if (parts.length === 4) { if (!isNaN(parts[3]) || parts[3] === '-') { z = parseZ(parts[3]); } else { color = parseColorStr(parts[3]); } } 
             else if (parts.length >= 5) { z = parseZ(parts[3]); color = parseColorStr(parts[4]); }
             
             let existing = savedPoints.find(p => p.name === name);
             if (existing) { existing.e = e; existing.n = n; existing.z = z; existing.color = color; updatedCount++; } 
             else { savedPoints.push({ id: Date.now() + Math.floor(Math.random()*1000), name: name, e: e, n: n, z: z, color: color }); addedCount++; }
          }
       }
    }
    if (addedCount > 0 || updatedCount > 0) { 
      localStorage.setItem('mgrsPoints', JSON.stringify(savedPoints)); updateSavedList(); drawMap(null, null, true); 
      alert(`${addedCount}件を追加、${updatedCount}件を上書きしました！`); 
      document.getElementById('io_text').value = "";
      toggleBatchIO(); 
    } else { 
      alert("読み込める座標がありませんでした。\n【書式】名称 E N 標高(任意) 色"); 
    }
  }

  // ========== ★カスタム地図設定ロジック ==========
  function saveMapOverlay() {
    let fileInput = document.getElementById('map_image_input');
    let tl_e = parseCoord(document.getElementById('map_tl_e').value); let tl_n = parseCoord(document.getElementById('map_tl_n').value);
    let br_e = parseCoord(document.getElementById('map_br_e').value); let br_n = parseCoord(document.getElementById('map_br_n').value);

    if(tl_e === null || tl_n === null || br_e === null || br_n === null) { alert("座標をすべて入力してください"); return; }

    if (fileInput.files && fileInput.files[0]) {
      let reader = new FileReader();
      reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
          let canvas = document.createElement('canvas'); let ctx = canvas.getContext('2d');
          let maxW = 1600; let scale = img.width > maxW ? maxW / img.width : 1;
          canvas.width = img.width * scale; canvas.height = img.height * scale;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          let dataUrl = canvas.toDataURL('image/jpeg', 0.8);

          mapOverlay = { dataUrl: dataUrl, tl_e: tl_e, tl_n: tl_n, br_e: br_e, br_n: br_n };
          try {
            localStorage.setItem('mgrsMapOverlay', JSON.stringify(mapOverlay));
            mapImageObj.src = dataUrl;
            alert("地図画像を保存・設定しました！"); 
            toggleMapSettings();
            drawMap(currentP1, currentP2, true);
          } catch(err) { alert("画像サイズが大きすぎます。容量の小さい画像を選んでください。"); }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(fileInput.files[0]);
    } else if (mapOverlay) {
      mapOverlay.tl_e = tl_e; mapOverlay.tl_n = tl_n; mapOverlay.br_e = br_e; mapOverlay.br_n = br_n;
      localStorage.setItem('mgrsMapOverlay', JSON.stringify(mapOverlay));
      alert("地図の座標を更新しました！"); 
      toggleMapSettings();
      drawMap(currentP1, currentP2, true);
    } else {
      alert("地図画像を選択してください");
    }
  }

  function clearMapOverlay() {
    if(confirm("カスタム地図の背景をクリアしますか？")) {
      mapOverlay = null; localStorage.removeItem('mgrsMapOverlay');
      document.getElementById('map_image_input').value = "";
      document.getElementById('map_tl_e').value = ""; document.getElementById('map_tl_n').value = "";
      document.getElementById('map_br_e').value = ""; document.getElementById('map_br_n').value = "";
      drawMap(currentP1, currentP2, true);
    }
  }

  // ========== マップ描画 ==========
  let mapState = { x: 0, y: 0, scale: 1, baseScale: 1, refE: 0, refN: 0, minDx: 0, maxDx: 0, minDy: 0, maxDy: 0, padding: 30 };
  let currentP1 = null; let currentP2 = null;

  function updateMapDropdowns() {
    let start = document.getElementById('map_start'); let end = document.getElementById('map_end');
    let html = '<option value="">--- 選択してください ---</option>'; savedPoints.forEach(p => { html += `<option value="${p.id}">${p.name}</option>`; });
    start.innerHTML = html; end.innerHTML = html;
  }

  function calcMap() {
    let sId = document.getElementById('map_start').value; let eId = document.getElementById('map_end').value; if (!sId || !eId) return;
    currentP1 = savedPoints.find(p => p.id == sId); currentP2 = savedPoints.find(p => p.id == eId);
    let r = calcData(currentP1.e, currentP1.n, currentP1.z, currentP2.e, currentP2.n, currentP2.z);
    let elvText = r.elvMil !== null ? `<br>高低差: ${r.dz > 0 ? '+' : ''}${Math.round(r.dz)} m<br>高低角: ${r.elvMil > 0 ? '+' : ''}${Math.round(r.elvMil)} mil` : "";
    let res = document.getElementById('resMap'); res.innerHTML = `【${currentP1.name} → ${currentP2.name}】<br>方位角: ${pad4(r.mil)}<br>距離: ${Math.round(r.dist)} m${elvText}`;
    res.classList.remove('hidden'); drawMap(currentP1, currentP2, false);
  }

  function resetMapView() { drawMap(currentP1, currentP2, true); }

  function drawMap(highlightP1 = null, highlightP2 = null, resetView = false) {
    let canvas = document.getElementById('mapCanvas'); let ctx = canvas.getContext('2d'); let w = canvas.width, h = canvas.height;
    const style = getComputedStyle(document.body);
    const cBg = style.getPropertyValue('--map-bg').trim() || "#fff"; 
    
    // ★ グリッド線の色を取得
    const cGrid1km = style.getPropertyValue('--map-grid-1km').trim() || "rgba(0,0,0,0.4)";
    const cGrid500m = style.getPropertyValue('--map-grid-500m').trim() || "rgba(0,0,0,0.25)";
    const cGrid100m = style.getPropertyValue('--map-grid-100m').trim() || "rgba(0,0,0,0.1)";
    const cText = style.getPropertyValue('--map-text').trim() || "rgba(0,0,0,0.7)";
    const cMainText = style.getPropertyValue('--text-color').trim() || "#333";
    
    ctx.fillStyle = cBg; ctx.fillRect(0, 0, w, h);

    // ★ 描画範囲の基準にするポイント（登録座標＋地図の四隅）
    let pointsToBound = [...savedPoints];
    if (mapOverlay) {
      pointsToBound.push({e: mapOverlay.tl_e, n: mapOverlay.tl_n});
      pointsToBound.push({e: mapOverlay.br_e, n: mapOverlay.br_n});
    }

    if (pointsToBound.length === 0) { 
      ctx.fillStyle = cText; ctx.font = "16px sans-serif"; ctx.textAlign = "center"; 
      ctx.fillText("座標または地図が登録されていません", w/2, h/2); 
      return; 
    }

    if (resetView) {
      mapState.refE = pointsToBound[0].e; mapState.refN = pointsToBound[0].n; 
      let minDx = 0, maxDx = 0, minDy = 0, maxDy = 0;
      pointsToBound.forEach(p => {
        let dx = p.e - mapState.refE; if (dx > 50000) dx -= 100000; else if (dx < -50000) dx += 100000;
        let dy = p.n - mapState.refN; if (dy > 50000) dy -= 100000; else if (dy < -50000) dy += 100000;
        if (dx < minDx) minDx = dx; if (dx > maxDx) maxDx = dx; if (dy < minDy) minDy = dy; if (dy > maxDy) maxDy = dy;
      });
      if (maxDx - minDx < 2000) { let mid = (maxDx + minDx)/2; minDx = mid - 1000; maxDx = mid + 1000; } 
      if (maxDy - minDy < 2000) { let mid = (maxDy + minDy)/2; minDy = mid - 1000; maxDy = mid + 1000; }
      mapState.minDx = minDx; mapState.maxDx = maxDx; mapState.minDy = minDy; mapState.maxDy = maxDy;
      mapState.baseScale = Math.min((w - mapState.padding*2) / (maxDx - minDx), (h - mapState.padding*2) / (maxDy - minDy));
      mapState.x = 0; mapState.y = 0; mapState.scale = 1;
    }

    let getX = (e) => { let dx = e - mapState.refE; if (dx > 50000) dx -= 100000; else if (dx < -50000) dx += 100000; return (mapState.padding + (dx - mapState.minDx) * mapState.baseScale) * mapState.scale + mapState.x; };
    let getY = (n) => { let dy = n - mapState.refN; if (dy > 50000) dy -= 100000; else if (dy < -50000) dy += 100000; return (h - mapState.padding - (dy - mapState.minDy) * mapState.baseScale) * mapState.scale + mapState.y; };
    let getX_real = (e_real) => { let dx = e_real - mapState.refE; return (mapState.padding + (dx - mapState.minDx) * mapState.baseScale) * mapState.scale + mapState.x; };
    let getY_real = (n_real) => { let dy = n_real - mapState.refN; return (h - mapState.padding - (dy - mapState.minDy) * mapState.baseScale) * mapState.scale + mapState.y; };
    
    // ★ カスタム地図画像の描画 (グリッドやピンの下に敷く)
    if (mapOverlay && mapImageObj.complete && mapImageObj.src) {
       let img_x = getX_real(mapOverlay.tl_e);
       let img_y = getY_real(mapOverlay.tl_n);
       let img_w = getX_real(mapOverlay.br_e) - img_x;
       let img_h = getY_real(mapOverlay.br_n) - img_y; 
       ctx.drawImage(mapImageObj, img_x, img_y, img_w, img_h);
    }

    let screenToDx = (X) => mapState.minDx + ((X - mapState.x) / mapState.scale - mapState.padding) / mapState.baseScale;
    let screenToDy = (Y) => mapState.minDy + ((h - mapState.padding - (Y - mapState.y) / mapState.scale)) / mapState.baseScale;
    let startDx = screenToDx(0) - 1000; let endDx = screenToDx(w) + 1000; let endDy = screenToDy(0) + 1000; let startDy = screenToDy(h) - 1000; 
    if(startDy > endDy) { let tmp = startDy; startDy = endDy; endDy = tmp; } if(startDx > endDx) { let tmp = startDx; startDx = endDx; endDx = tmp; }
    
    let startE_real = Math.floor((mapState.refE + startDx) / 1000) * 1000; let endE_real = Math.ceil((mapState.refE + endDx) / 1000) * 1000;
    let startN_real = Math.floor((mapState.refN + startDy) / 1000) * 1000; let endN_real = Math.ceil((mapState.refN + endDy) / 1000) * 1000;

    // ★ 100m方眼の判定と描画 (ズーム時のみ表示)
    let pixelPer100m = 100 * mapState.baseScale * mapState.scale;
    if (pixelPer100m > 12) { 
      let startE_100 = Math.floor((mapState.refE + startDx) / 100) * 100; let endE_100 = Math.ceil((mapState.refE + endDx) / 100) * 100;
      let startN_100 = Math.floor((mapState.refN + startDy) / 100) * 100; let endN_100 = Math.ceil((mapState.refN + endDy) / 100) * 100;
      
      // 1. 標準の100m線 (1kmと500m以外)
      ctx.strokeStyle = cGrid100m; ctx.lineWidth = 1; ctx.beginPath();
      for(let e = startE_100; e <= endE_100; e += 100) {
        if(e % 500 === 0) continue; 
        let x = getX_real(e); if(x > -50 && x < w + 50) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
      }
      for(let n = startN_100; n <= endN_100; n += 100) {
        if(n % 500 === 0) continue;
        let y = getY_real(n); if(y > -50 && y < h + 50) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
      }
      ctx.stroke();

      // 2. 500m線 (1km以外) - 少し太く濃くする
      ctx.strokeStyle = cGrid500m; ctx.lineWidth = 1.2; ctx.beginPath();
      for(let e = startE_100; e <= endE_100; e += 100) {
        if(e % 500 === 0 && e % 1000 !== 0) {
          let x = getX_real(e); if(x > -50 && x < w + 50) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
        }
      }
      for(let n = startN_100; n <= endN_100; n += 100) {
        if(n % 500 === 0 && n % 1000 !== 0) {
          let y = getY_real(n); if(y > -50 && y < h + 50) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
        }
      }
      ctx.stroke();

      // 3. 1〜9のナンバリング (さらにズームした時だけ表示)
      if (pixelPer100m > 20) {
        ctx.font = "9px sans-serif"; ctx.fillStyle = cText;
        ctx.textAlign = "left"; 
        for(let e = startE_100; e <= endE_100; e += 100) {
          if(e % 1000 === 0) continue;
          let x = getX_real(e); 
          if(x > 0 && x < w) { 
            let digit = Math.floor(Math.abs(e % 1000) / 100);
            ctx.fillText(digit, x + 3, h - 15); // 下端 (1kmラベルの上)
            ctx.fillText(digit, x + 3, 10);     // 上端
          }
        }
        for(let n = startN_100; n <= endN_100; n += 100) {
          if(n % 1000 === 0) continue;
          let y = getY_real(n); 
          if(y > 0 && y < h) { 
            let digit = Math.floor(Math.abs(n % 1000) / 100);
            ctx.fillText(digit, 22, y - 2);     // 左端 (1kmラベルの右)
            ctx.fillText(digit, w - 10, y - 2); // 右端
          }
        }
      }
    }

    // ★ 1km方眼の描画 (一番くっきり)
    ctx.strokeStyle = cGrid1km; ctx.lineWidth = 1.5; ctx.beginPath();
    for(let e = startE_real; e <= endE_real; e += 1000) { let x = getX_real(e); if(x > -50 && x < w + 50) { ctx.moveTo(x, 0); ctx.lineTo(x, h); } }
    for(let n = startN_real; n <= endN_real; n += 1000) { let y = getY_real(n); if(y > -50 && y < h + 50) { ctx.moveTo(0, y); ctx.lineTo(w, y); } }
    ctx.stroke();

    // ★ 1km方眼のテキスト(数値)
    ctx.font = "bold 11px sans-serif"; ctx.fillStyle = cText;
    ctx.textAlign = "center"; for(let e = startE_real; e <= endE_real; e += 1000) { let x = getX_real(e); if(x > -50 && x < w + 50) { ctx.fillText(pad5(e).substring(0,2), x, h - 5); } }
    ctx.textAlign = "left"; for(let n = startN_real; n <= endN_real; n += 1000) { let y = getY_real(n); if(y > -50 && y < h + 50) { ctx.fillText(pad5(n).substring(0,2), 5, y + 4); } }

    if (highlightP1 && highlightP2) { ctx.strokeStyle = isNightMode ? '#ff3b30' : 'rgba(0, 122, 255, 0.7)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(getX(highlightP1.e), getY(highlightP1.n)); ctx.lineTo(getX(highlightP2.e), getY(highlightP2.n)); ctx.stroke(); }

    savedPoints.forEach(p => {
      let x = getX(p.e), y = getY(p.n); let pinColor = isNightMode ? '#ff3b30' : (p.color || '#ff3b30');
      if(x > -20 && x < w + 20 && y > -20 && y < h + 20) {
        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fillStyle = pinColor; ctx.fill();
        ctx.strokeStyle = cBg; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = cMainText; ctx.font = "bold 12px sans-serif"; ctx.fillText(p.name, x + 10, y + 4);
      }
    });
  }

  const canvas = document.getElementById('mapCanvas'); let isDragging = false; let startPan = { x: 0, y: 0 }; let initialPinchDist = null;
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (e.touches.length === 1) { isDragging = true; startPan = { x: e.touches[0].clientX - mapState.x, y: e.touches[0].clientY - mapState.y }; } else if (e.touches.length === 2) { isDragging = false; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) { mapState.x = e.touches[0].clientX - startPan.x; mapState.y = e.touches[0].clientY - startPan.y; requestAnimationFrame(() => drawMap(currentP1, currentP2, false)); }
    else if (e.touches.length === 2 && initialPinchDist) {
      const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2; const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = canvas.getBoundingClientRect(); const canvasCenterX = centerX - rect.left; const canvasCenterY = centerY - rect.top; const scaleFactor = newDist / initialPinchDist;
      mapState.x = canvasCenterX - (canvasCenterX - mapState.x) * scaleFactor; mapState.y = canvasCenterY - (canvasCenterY - mapState.y) * scaleFactor; mapState.scale *= scaleFactor; requestAnimationFrame(() => drawMap(currentP1, currentP2, false)); initialPinchDist = newDist;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', (e) => { e.preventDefault(); if (e.touches.length < 2) initialPinchDist = null; if (e.touches.length === 0) isDragging = false; });

  // 初期化
  updateSavedList(); syncColorPickers();
</script>
</body>
